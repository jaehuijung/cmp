<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
    <meta charset="UTF-8" http-equiv="Content-Security-Policy" content="upgrade-insecure-requests"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link rel="icon" type="image/x-icon" href="/images/icon/favicon.png">
    <title>Cable Management Platform</title>

    <th:block layout:fragment="css">
        <link th:href="@{/assets/vendor/bootstrap/css/bootstrap.min.css}" rel="stylesheet">
        <link th:href="@{/assets/vendor/bootstrap/css/bootstrap-table.min.css}" rel="stylesheet">
        <link th:href="@{/assets/vendor/SweetAlert2/sweetalert2.min.css}" rel="stylesheet">
        <link th:href="@{/assets/vendor/pikaday/pikaday.css}" rel="stylesheet">
        <link th:href="@{/assets/vendor/swiper/swiper-bundle.min.css}" rel="stylesheet">

        <link th:href="@{/css/layout.css}" rel="stylesheet">
        <link th:href="@{/css/custom-bootstrap.css}" rel="stylesheet">
        <link th:href="@{/css/custom-sweetAlert2.css}" rel="stylesheet">
        <link th:href="@{/css/custom-pikaday.css}" rel="stylesheet">
    </th:block>

    <style>
        /* styles.css */
        body, html {
          margin: 0;
          padding: 0;
          font-family: Arial, sans-serif;
          box-sizing: border-box;
        }

        .layout {
          display: flex;
          flex-direction: column;
          height: 100vh;
        }

        /* 1영역: 헤더 스타일 */
        .header {
          display:flex;
          justify-content: space-between;
          background-color: #00274D;
          color: white;
          text-align: center;
          padding: 10px 0px;;
          font-size: 24px;
          flex-shrink: 0;
        }

        .header-left{
            display: flex;
        }

        #header-left-logo {
            width: 200px;
            height: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-right: 1px solid #999;
        }

        #header-left-logo-img {
            width: 150px;
            height: 30px;
            cursor: pointer;
        }

        #header-left-content {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 500;
            color: white;
            padding: 0px 15px;
            border-right: 1px solid #999;
        }

        .header-right {
            display: flex;
        }

        #header-right-name {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 500;
            color: white;
            padding: 0px 15px;
            border-left: 1px solid #999;
        }

        #header-right-logout {
            width: 100px;
            height: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-left: 1px solid #999;
            font-size: 13px;
            color: #fff;
        }


        @media (max-width: 650px) {
            #header-right-name {
                border-left: 0px;
            }
        }

        @media (max-width: 550px) {
            #header-right-name {
                display: none;
            }

            #header-right-logout {
                border-left: 0px;
            }
        }

        @media (max-width: 430px) {
            #header-left-content {
                display: none;
            }
        }

        @media (max-width: 250px) {
            .header {
                justify-content: center;
            }

            #header-right-logout {
                display: none;
            }

            #header-left-logo {
                width: 100%;
                border-right: 0px;
            }

            #header-left-logo-img {
                width: 100px;
                height: 20px;
                cursor: pointer;
            }

            .content {
                display: none;
            }

            .main-container {
                width: 100%;
            }

            .sidebar {
                width: 100% !important;
            }

        }

        @media (max-width: 180px) {
            #header-left-logo-img {
                width: 70px;
                height: 15px;
                cursor: pointer;
            }
        }

        /* 메인 컨테이너 레이아웃 */
        .main-container {
          display: flex;
          flex: 1;
          overflow: hidden;
        }

        /* 2영역: 사이드바 스타일 */
        .sidebar {
          background-color: #4B4B4B;
          width: 200px;
          box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1);
          overflow-y: auto;
        }

        .sidebar .menu-icon{
            width: 18px;
            margin-right: 20px;
        }

		.sidebar .dropdown-item .menu-icon{
            width: 13px;
            margin-right: 5px;
        }

        #menu-items {
            display: flex;
            flex-direction: column;
        }

		.menu-item:hover {
			background-color: #007bff;
			color: #ffffff;
		}

        /* 드롭다운 컨테이너 */
		.menu-item {
			position: relative; /* 하위 메뉴를 자식으로 설정 */
			margin: 0;
			padding:0 10px;
            border-bottom: 1px solid #888;
		}

		.side-menu-item {
			display: flex;
            color: #fff;
            text-decoration: none;
            align-items: center;
            border-radius: 5px;
            padding: 10px 0;
            font-size: 14px;
		}

        /* 드롭다운 메뉴 (부모 메뉴의 넓이를 채움) */
		.dropdown-menu {
			display: none; /* 기본적으로 숨김 처리 */
			position: absolute;
			left: 0;
			top: calc(100% + 2px); /* 상위 메뉴 바로 아래 */
			min-width: 100%; /* 부모 메뉴의 넓이를 채움 */
			z-index: 1000;
			background-color: #00274D;
			border: 0;
			border-radius: 0;
			box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
		}

		/* 드롭다운 테두리 확장 */
		.dropdown-menu::before {
			content: "";
			position: absolute;
			top: -7px;
			left: 20px;
			width: 10px;
			height: 10px;
			background: inherit;
			z-index: -1;
			transform: rotate(45deg); /* 화살표를 위한 삼각형 효과 */
			border-left: 1px solid #ddd;
			border-top: 1px solid #ddd;
		}

		/* 드롭다운 메뉴가 열렸을 때 */
		.menu-item.show .dropdown-menu {
			display: block; /* 보이도록 처리 */
		}

		/* 드롭다운 항목 스타일 */
		.dropdown-item {
			display: flex;
    		align-items: center;
    		margin-left: 25px;
			padding: 5px;
			text-decoration: none;
			color: #999;
			transition: background-color 0.3s, color 0.3s;
			white-space: nowrap;
			font-size: 11px;
    		width: max-content;
		}

		.dropdown-item.active {
			background: #00274D;
			color: lightgreen;
		}

		.dropdown-item:hover {
			background: #00274D;
			color: lightgreen;
		}

        /* 3영역: 콘텐츠 스타일 */
        .content {
          flex: 1;
          padding: 20px;
          background-color: #ffffff;
          overflow-y: auto;
        }

        .content h2 {
          margin-top: 0;
        }
    </style>
</head>

<body>

<th:block layout:fragment="script">
    <script th:src="@{/assets/vendor/axios/axios.min.js}"></script>
    <script th:src="@{/assets/vendor/jquery/jquery.min.js}"></script>
    <script th:src="@{/assets/vendor/bootstrap/js/bootstrap.bundle.min.js}"></script>
    <script th:src="@{/assets/vendor/bootstrap/js/bootstrap-table.min.js}"></script>
    <script th:src="@{/assets/vendor/SweetAlert2/sweetalert2.min.js}"></script>
    <script th:src="@{/assets/vendor/chart.js/chart.umd.js}"></script>
    <script th:src="@{/assets/vendor/pikaday/pikaday.js}"></script>
    <script th:src="@{/assets/vendor/swiper/swiper-bundle.min.js}"></script>

    <script>
        // 왼쪽 사이드메뉴 구성
        function buildSideMenu(menuData, currentUrl) {
            const currentMenu = getParentMenuId(menuData, currentUrl);

            if (!currentMenu) {
                alert2(
                    "알림",
                    "메뉴를 찾을 수 없는 오류가 발생했습니다. <br> 새로고침 후 문제가 지속되면 관리자에게 문의하세요.",
                    "info",
                    "확인"
                );
                return;
            }

            const sideMenuContainer = $('#menu-items');

            // 필터링: 최상위 메뉴 (parent_menu_id가 00000000)
            const topLevelMenus = menuData.filter(menu => menu.parent_menu_id === '00000000');

            // HTML 생성
            const sideMenuHtml = topLevelMenus
                .map(menu => {
                    // 현재 메뉴 활성화 여부
                    const isActive = menu.menu_id === currentMenu.menu_id ? ' active' : '';

                    // 하위 메뉴 탐색
                    const subMenus = menuData.filter(subMenu => subMenu.parent_menu_id === menu.menu_id);

                    // 하위 메뉴 구성
                    const subMenuHtml = subMenus.length > 0
						? `
							<ul class="dropdown-menu">
								${subMenus
									.map(subMenu => {
										const subActive = subMenu.menu_id === currentMenu.menu_id ? ' active' : '';
										return `
											<li>
												<a href="${subMenu.url}" class="dropdown-item${subActive}">
												   <img src="${subMenu.icon}" alt="icon" class="menu-icon" />
												   ${subMenu.menu_name}
												</a>
											</li>
										`;
									})
								.join('')}
							</ul>
						`
						: '';

                    // 부모 메뉴 및 하위 메뉴 HTML
                    return `
                        <div class="menu-item dropdown">
								<a href="${subMenus.length > 0 ? '#' : menu.url}"
								   class="side-menu-item dropdown-toggle ${isActive}"
								   ${subMenus.length > 0 ? 'data-bs-toggle="dropdown" aria-expanded="false"' : ''}>
									<img src="${menu.icon}" alt="icon" class="menu-icon" />
									${menu.menu_name}
								</a>
								${subMenuHtml}
                        </div>
                    `;
                })
                .join('');

            if (sideMenuContainer.length > 0) {
                sideMenuContainer.html(sideMenuHtml);
            }
        }

    </script>
    <script th:src="@{/js/common/custom-menu.js}"></script>
    <script th:src="@{/js/common/custom-function.js}"></script>
    <script th:src="@{/js/common/custom-sweetAlert2.js}"></script>
    <script th:src="@{/js/common/custom-bootstrap.js}"></script>

</th:block>

<div class="layout">
    <!-- 1영역: 헤더 -->
    <div class="header">
        <div class="header-left">
            <div id="header-left-logo">
                <img id="header-left-logo-img" src="/images/logo/logo.png" alt="logo"
                     onclick="location.href='/cable/agency/view'"/>
            </div>

            <div id="header-left-content">
                <p style="margin:0;">케이블 관리시스템</p>
            </div>
        </div>

        <div class="header-right">

            <div id="header-right-name">
                <a>
                    <span th:text="${accountData.name}+'님'"></span>
                </a>
            </div>

            <div id="header-right-logout">
                <a href="#" onclick="usrlogout();">
                    <span>로그아웃</span>
                </a>
            </div>

            <form name='logoutform' id='logoutform' method='POST' action='/logout'></form>
        </div>
    </div>

    <div class="main-container">
        <!-- 2영역: 사이드바 -->
        <div class="sidebar">
            <!-- 사이드바 메뉴 항목 custom-menu.js 에서 동적생성 -->
            <div id="menu-items" class="items-section"></div>
        </div>

        <!-- 3영역: 콘텐츠 -->
        <div class="content">
            <h2>3영역 (페이지 콘텐츠)</h2>
            <p>여기에 메뉴별 페이지 내용이 표시됩니다.</p>
        </div>
    </div>
</div>


</body>

</html>
